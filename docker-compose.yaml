services:
  gpsd:
    image: ghcr.io/chrismeller/gpsd-docker/gpsd:latest@sha256:9bd60933661cc2ea3b897fb8135f58104a0d7ba419f57c2682f9b597a127d4be
    container_name: gpsd
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    ports:
      - "2947:2947"
    environment:
      - TZ=UTC
      - GPS_DEVICE=/dev/ttyACM0
      - PPS_DEVICE=
      - GPS_SPEED=38400
      - DEBUG_LEVEL=3
    cap_add:
      - SYS_TIME
      - SYS_NICE
    restart: unless-stopped
    ipc: shareable
    # depends_on:
    #   chrony:
    #     condition: service_healthy

  chrony:
    image: ghcr.io/chrismeller/gpsd-docker/chrony:latest@sha256:49493f2d953f404ef18a1a2d2a7e6b4bcd44cdfe9cdef12862ac93e18a305552
    container_name: chrony
    ports:
      - "123:123/udp"
      - "323:323/udp"
    volumes:
      #- gpsd_socket:/run/:rw
      - ./chrony/chrony.conf:/etc/chrony/chrony.conf:ro
    environment:
      - TZ=UTC
      - LOG_LEVEL=0   # 0 = information, higher gets lower
    ipc: service:gpsd
    cap_add:
      - SYS_TIME
      - SYS_NICE
    restart: unless-stopped
    depends_on:
     gpsd:
       condition: service_healthy

  exporter:
    image: ghcr.io/chrismeller/gpsd-docker/exporter:latest@sha256:29a555da0ae1807150d0c1d340751d64465a25611d7c63add504f5184cc059cc
    container_name: exporter
    ports:
      - "9978:9978/tcp"
    environment:
      - TZ=UTC
    depends_on:
      gpsd:
        condition: service_healthy

# volumes:
#   gpsd_socket:
